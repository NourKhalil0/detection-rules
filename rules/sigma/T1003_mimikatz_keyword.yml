title: Mimikatz Keywords in CommandLine
id: 9d3365b8-b6e9-4f6d-b492-2b3527ac1c9e
status: test
description: >
    Detects keywords commonly associated with Mimikatz in process command lines.
    While sophisticated attackers rename or obfuscate Mimikatz, many commodity
    threats still use it in recognizable forms.
references:
    - https://attack.mitre.org/techniques/T1003/
author: NourKhalil0
date: 2025/09/23
tags:
    - attack.credential_access
    - attack.t1003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'sekurlsa::logonpasswords'
            - 'sekurlsa::wdigest'
            - 'lsadump::sam'
            - 'lsadump::dcsync'
            - 'privilege::debug'
            - 'kerberos::ptt'
            - 'mimikatz'
    condition: selection
falsepositives:
    - Security research and red team exercises
    - AV/EDR products scanning for these strings (check parent process)
level: critical
# Triage notes:
# 1. This is a high-confidence rule - immediate escalation warranted
# 2. Isolate the host if possible before further investigation
# 3. Check for successful credential access events after this alert
# 4. Identify what account ran this and whether it is compromised
