title: Unusual Parent Process for cmd.exe
id: 2e33b9dc-8660-46ae-a612-d6784de39439
status: test
description: >
    Detects cmd.exe being spawned by processes that would not normally launch it.
    Applications like Word, Excel, browsers, or Java spawning cmd.exe is a strong
    indicator of exploitation or a malicious macro.
references:
    - https://attack.mitre.org/techniques/T1059/003/
author: NourKhalil0
date: 2025/09/24
tags:
    - attack.execution
    - attack.t1059.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\cmd.exe'
        ParentImage|endswith:
            - '\winword.exe'
            - '\excel.exe'
            - '\powerpnt.exe'
            - '\outlook.exe'
            - '\chrome.exe'
            - '\firefox.exe'
            - '\iexplore.exe'
            - '\java.exe'
            - '\javaw.exe'
            - '\acrord32.exe'
    condition: selection
falsepositives:
    - Legitimate macros in controlled environments (rare)
    - Some older enterprise software with poor design
level: high
# Triage notes:
# 1. Very high fidelity - few legitimate scenarios for this
# 2. Identify what document or page triggered this
# 3. Check what cmd.exe then executed
# 4. Look for subsequent network connections or file writes
