title: Password Spraying via High Volume Failed Logons
id: 58a6dddf-9594-46cb-9848-4a49a39f81dc
status: test
description: >
    Detects a high number of failed logon attempts from one source against
    multiple different accounts within a short timeframe, which is the hallmark
    pattern of password spraying. Unlike brute force, spraying uses one or two
    passwords against many accounts to avoid lockout.
references:
    - https://attack.mitre.org/techniques/T1110/001/
author: NourKhalil0
date: 2025/09/18
tags:
    - attack.credential_access
    - attack.t1110.001
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
        SubStatus:
            - '0xC000006A'
            - '0xC0000064'
    timeframe: 5m
    condition: selection | count(TargetUserName) by IpAddress > 10
falsepositives:
    - Misconfigured service accounts with wrong credentials
    - User who forgot password and retried many times
    - Vulnerability scanners in the environment
level: high
# Triage notes:
# 1. Look at the IpAddress - internal or external? VPN range?
# 2. How many unique accounts were targeted? More than 5 is concerning
# 3. Were any logons successful (EventID 4624) shortly after?
# 4. Check if the targeted usernames follow a pattern (firstname.lastname format suggests directory enumeration)
